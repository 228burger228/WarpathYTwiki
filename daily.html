<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Arms Race — Warpath Guide</title>
<link rel="stylesheet" href="style.css">
<style>

/* ═══════════════════════════════════════════
   PAGE LAYOUT
   ═══════════════════════════════════════════ */
.daily-page {
  max-width: 1100px;
  margin: 0 auto;
  padding: 2rem 1rem 5rem;
}

/* ═══════════════════════════════════════════
   WEEK TABS
   ═══════════════════════════════════════════ */
.week-tabs {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: .4rem;
  margin-bottom: 2rem;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .5rem;
}
.day-tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: .6rem .3rem;
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .2s;
  position: relative;
}
.day-tab:hover {
  background: rgba(200,150,28,.07);
  border-color: var(--border);
}
.day-tab.active {
  background: rgba(200,150,28,.12);
  border-color: var(--gold);
}
.day-tab.today {
  background: rgba(200,150,28,.18);
  border-color: var(--gold2);
}
.day-tab.today::before {
  content: 'СЕГОДНЯ';
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: .48rem;
  font-weight: 700;
  letter-spacing: 1px;
  color: #000;
  background: var(--gold);
  padding: 1px 5px;
  border-radius: 3px;
  white-space: nowrap;
}
.day-tab.today.active { background: rgba(200,150,28,.25); }
.day-tab-short {
  font-family: 'Bebas Neue', sans-serif;
  font-size: .85rem;
  letter-spacing: 1.5px;
  color: var(--muted);
  transition: color .2s;
}
.day-tab.active .day-tab-short,
.day-tab.today .day-tab-short { color: var(--gold2); }
.day-tab-icon { font-size: 1.1rem; }
.day-tab-name {
  font-size: .6rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.2;
}

@media (max-width: 600px) {
  .week-tabs { grid-template-columns: repeat(7, 1fr); gap: .2rem; padding: .35rem; }
  .day-tab { padding: .4rem .15rem; }
  .day-tab-name { display: none; }
  .day-tab-short { font-size: .75rem; }
  .day-tab-icon { font-size: .9rem; }
  .day-tab.today::before { font-size: .4rem; top: -9px; }
}

/* ═══════════════════════════════════════════
   DAY PANEL
   ═══════════════════════════════════════════ */
.day-panel { display: none; }
.day-panel.active { display: block; }

.day-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.day-icon-big { font-size: 2.5rem; }
.day-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 2px;
  color: var(--gold2);
  line-height: 1;
}
.day-weekday {
  font-size: .72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: .2rem;
}
.today-badge {
  display: none;
  background: var(--gold);
  color: #000;
  font-family: 'Bebas Neue', sans-serif;
  font-size: .9rem;
  letter-spacing: 2px;
  padding: .2rem .8rem;
  border-radius: 6px;
}
.day-panel[data-today="true"] .today-badge { display: block; }

.daily-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.2rem;
}
@media (max-width: 700px) {
  .daily-grid { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════════
   TASKS BLOCK
   ═══════════════════════════════════════════ */
.block-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: .8rem;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: .85rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}
.block-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.task-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: .75rem;
  padding: .55rem .75rem;
  background: rgba(255,255,255,.03);
  border: 1px solid var(--border);
  border-radius: 7px;
  margin-bottom: .4rem;
  transition: border-color .15s;
  cursor: default;
}
.task-item:hover { border-color: rgba(200,150,28,.25); }
.task-text {
  font-size: .82rem;
  color: var(--text);
  line-height: 1.35;
  flex: 1;
}
.task-pts {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 1px;
  color: var(--gold);
  white-space: nowrap;
  flex-shrink: 0;
}
.task-pts::before { content: '+'; }

/* ═══════════════════════════════════════════
   CALCULATOR
   ═══════════════════════════════════════════ */
.calc-block {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.2rem;
  margin-bottom: 1.2rem;
  grid-column: 1 / -1;
}
.calc-inputs {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: .75rem;
  margin-bottom: 1rem;
}
.calc-field { display: flex; flex-direction: column; gap: .3rem; }
.calc-label {
  font-size: .7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.calc-input-row {
  display: flex;
  align-items: center;
}
.calc-btn {
  width: 32px; height: 36px;
  background: rgba(255,255,255,.05);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .15s;
  flex-shrink: 0;
}
.calc-btn:first-child { border-radius: 6px 0 0 6px; border-right: none; }
.calc-btn:last-child  { border-radius: 0 6px 6px 0; border-left: none; }
.calc-btn:hover { background: rgba(200,150,28,.12); color: var(--gold); }
.calc-num {
  width: 60px;
  text-align: center;
  background: rgba(255,255,255,.04);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: .95rem;
  font-family: inherit;
  padding: .45rem 0;
  outline: none;
  -moz-appearance: textfield;
}
.calc-num::-webkit-inner-spin-button { -webkit-appearance: none; }
.calc-num:focus { border-color: var(--gold); }

.calc-result {
  background: rgba(200,150,28,.06);
  border: 1px solid rgba(200,150,28,.2);
  border-radius: 10px;
  padding: 1rem 1.3rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  flex-wrap: wrap;
}
.calc-total-pts {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.4rem;
  letter-spacing: 2px;
  color: var(--gold2);
  line-height: 1;
}
.calc-total-label {
  font-size: .72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-top: .2rem;
}
.calc-rank-result {
  flex: 1;
  min-width: 180px;
}
.calc-rank-line {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: .78rem;
  padding: .22rem 0;
  border-bottom: 1px solid rgba(255,255,255,.05);
}
.calc-rank-line:last-child { border-bottom: none; }
.calc-rank-name { color: var(--muted); }
.calc-rank-val  { font-family: 'Barlow Condensed', sans-serif; font-weight: 700; color: var(--gold2); }
.calc-rank-need { font-size: .7rem; color: #e04848; }
.calc-rank-ok   { color: #7ec850; }

/* ═══════════════════════════════════════════
   REWARDS TABLE
   ═══════════════════════════════════════════ */
.rewards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  grid-column: 1 / -1;
}
@media (max-width: 600px) {
  .rewards-grid { grid-template-columns: 1fr; }
}

.rewards-block {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.rewards-block-head {
  padding: .6rem 1rem;
  border-bottom: 1px solid var(--border);
  font-family: 'Bebas Neue', sans-serif;
  font-size: .78rem;
  letter-spacing: 2.5px;
  color: var(--muted);
  background: rgba(255,255,255,.02);
}
.reward-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: .45rem 1rem;
  border-bottom: 1px solid var(--border);
  font-size: .8rem;
  transition: background .12s;
}
.reward-row:last-child { border-bottom: none; }
.reward-row:hover { background: rgba(255,255,255,.025); }
.reward-row.highlight {
  background: rgba(200,150,28,.07);
  border-left: 2px solid var(--gold);
}
.rank-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: .9rem;
  letter-spacing: 1px;
  color: var(--muted);
  width: 52px;
  flex-shrink: 0;
}
.rank-badge.r1 { color: #ffd040; }
.rank-badge.r2 { color: #c0c0c0; }
.rank-badge.r3 { color: #cd7f32; }
.reward-pts {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: .95rem;
  font-weight: 700;
  color: var(--text);
}
.reward-pts span {
  font-size: .65rem;
  color: var(--muted);
  margin-left: .2rem;
}

</style>
</head>

const CITY_LABELS = ['Город 1','Город 2','Город 3'];

const DAY_SHORTS_RU = ['ПН','ВТ','СР','ЧТ','ПТ','СБ','ВС'];
const DAY_SHORTS_EN = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
const DAY_SHORTS_VI = ['T2','T3','T4','T5','T6','T7','CN'];

/* JS Date: 0=Sun,1=Mon..6=Sat → наш индекс 0=Mon..6=Sun */
function getTodayIndex() {
  const d = new Date().getDay(); // 0=Sun
  return d === 0 ? 6 : d - 1;
}

function fmtNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000)    return (n / 1000).toFixed(0) + 'K';
  return n.toString();
}

let activeDay = getTodayIndex();

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
function getLang() {
  return (typeof currentLang !== 'undefined') ? currentLang : 'ru';
}
function txt(obj) {
  const l = getLang();
  return obj[l] || obj['ru'];
}

function renderWeekTabs() {
  const today = getTodayIndex();
  const lang  = getLang();
  const shorts = lang === 'en' ? DAY_SHORTS_EN : lang === 'vi' ? DAY_SHORTS_VI : DAY_SHORTS_RU;
  const tabsEl = document.getElementById('week-tabs');
  tabsEl.innerHTML = '';
  DAYS_DATA.forEach((d, i) => {
    const tab = document.createElement('div');
    tab.className = 'day-tab' +
      (i === activeDay ? ' active' : '') +
      (i === today     ? ' today'  : '');
    tab.innerHTML = `
      <div class="day-tab-short">${shorts[i]}</div>
      <div class="day-tab-icon">${d.icon}</div>
      <div class="day-tab-name">${txt(d.weekday)}</div>`;
    tab.addEventListener('click', () => { activeDay = i; renderAll(); });
    tabsEl.appendChild(tab);
  });
}

function renderDayPanel(d, idx) {
  const today = getTodayIndex();
  const lang  = getLang();
  const isToday = idx === today;

  /* Tasks HTML */
  const tasksHtml = d.tasks.map(t => `
    <div class="task-item">
      <span class="task-text">${txt(t.text)}</span>
      <span class="task-pts">${fmtNum(t.pts)}</span>
    </div>`).join('');

  /* Calc fields */
  const calcFields = d.tasks.map((t, ti) => `
    <div class="calc-field">
      <div class="calc-label">${txt(t.text).slice(0, 28)}${txt(t.text).length > 28 ? '…' : ''} <span style="color:var(--gold);font-size:.65rem">(+${fmtNum(t.pts)} за ед.)</span></div>
      <div class="calc-input-row">
        <button class="calc-btn" onclick="calcAdj('${d.id}',${ti},-1)">−</button>
        <input class="calc-num" id="calc-${d.id}-${ti}" type="number" min="0" value="0" oninput="calcUpdate('${d.id}')">
        <button class="calc-btn" onclick="calcAdj('${d.id}',${ti},1)">+</button>
      </div>
    </div>`).join('');

  /* Personal rewards */
  const personalHtml = d.personal.map((pts, ri) => {
    const rc = ri === 0 ? 'r1' : ri === 1 ? 'r2' : ri === 2 ? 'r3' : '';
    return `<div class="reward-row" id="prow-${d.id}-${ri}">
      <span class="rank-badge ${rc}">${RANK_LABELS[ri]}</span>
      <span class="reward-pts">${fmtNum(pts)}<span>очков</span></span>
    </div>`;
  }).join('');

  /* City rewards */
  const cityHtml = d.city.map((pts, ri) => {
    const rc = ri === 0 ? 'r1' : ri === 1 ? 'r2' : ri === 2 ? 'r3' : '';
    return `<div class="reward-row">
      <span class="rank-badge ${rc}">${CITY_LABELS[ri]}</span>
      <span class="reward-pts">${fmtNum(pts)}<span>очков</span></span>
    </div>`;
  }).join('');

  const todayLabel = lang === 'en' ? 'TODAY' : lang === 'vi' ? 'HÔM NAY' : 'СЕГОДНЯ';

  return `
  <div class="day-panel${idx === activeDay ? ' active' : ''}" data-idx="${idx}" data-today="${isToday}">
    <div class="day-header">
      <div class="day-icon-big">${d.icon}</div>
      <div>
        <div class="day-title">${txt(d.name)}</div>
        <div class="day-weekday">${txt(d.weekday)}</div>
      </div>
      <div class="today-badge">${todayLabel}</div>
    </div>

    <div class="daily-grid">

      <!-- Калькулятор очков -->
      <div class="calc-block">
        <div class="block-title">
          ${lang === 'en' ? '🧮 Score Calculator' : lang === 'vi' ? '🧮 Máy tính điểm' : '🧮 Калькулятор очков'}
        </div>
        <div class="calc-inputs">${calcFields}</div>
        <div class="calc-result">
          <div>
            <div class="calc-total-pts" id="calc-total-${d.id}">0</div>
            <div class="calc-total-label">${lang === 'en' ? 'Total points' : lang === 'vi' ? 'Tổng điểm' : 'Итого очков'}</div>
          </div>
          <div class="calc-rank-result" id="calc-rank-${d.id}">
            <div class="calc-rank-line">
              <span class="calc-rank-name">${lang === 'en' ? 'Enter values above' : lang === 'vi' ? 'Nhập giá trị ở trên' : 'Введи значения выше'}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Задания -->
      <div>
        <div class="block-title">${lang === 'en' ? '📋 Tasks & Points' : lang === 'vi' ? '📋 Nhiệm vụ' : '📋 Задания и очки'}</div>
        ${tasksHtml}
      </div>

      <!-- Личные награды -->
      <div>
        <div class="block-title">${lang === 'en' ? '🏆 Personal Rewards' : lang === 'vi' ? '🏆 Phần thưởng cá nhân' : '🏆 Личные награды'}</div>
        <div class="rewards-block">
          <div class="rewards-block-head">${lang === 'en' ? 'Rank → Required points' : lang === 'vi' ? 'Hạng → Điểm cần thiết' : 'Ранг → Нужно очков'}</div>
          ${personalHtml}
        </div>
      </div>

      <!-- Городские награды -->
      <div>
        <div class="block-title">${lang === 'en' ? '🏙 City Rewards' : lang === 'vi' ? '🏙 Phần thưởng thành phố' : '🏙 Городские награды'}</div>
        <div class="rewards-block">
          <div class="rewards-block-head">${lang === 'en' ? 'City Rank → Required points' : lang === 'vi' ? 'Hạng thành phố → Điểm cần' : 'Ранг города → Нужно очков'}</div>
          ${cityHtml}
        </div>
      </div>

    </div>
  </div>`;
}

function renderDayPanels() {
  const container = document.getElementById('day-panels');
  container.innerHTML = DAYS_DATA.map((d, i) => renderDayPanel(d, i)).join('');
}

function renderAll() {
  renderWeekTabs();
  renderDayPanels();
}

/* ═══════════════════════════════════════════
   CALCULATOR LOGIC
   ═══════════════════════════════════════════ */
function calcAdj(dayId, taskIdx, delta) {
  const el = document.getElementById(`calc-${dayId}-${taskIdx}`);
  if (!el) return;
  el.value = Math.max(0, (parseInt(el.value) || 0) + delta);
  calcUpdate(dayId);
}

function calcUpdate(dayId) {
  const dIdx = DAYS_DATA.findIndex(d => d.id === dayId);
  if (dIdx < 0) return;
  const d = DAYS_DATA[dIdx];

  let total = 0;
  d.tasks.forEach((t, ti) => {
    const el = document.getElementById(`calc-${dayId}-${ti}`);
    const val = Math.max(0, parseInt(el?.value) || 0);
    total += val * t.pts;
  });

  const totalEl = document.getElementById(`calc-total-${dayId}`);
  if (totalEl) totalEl.textContent = fmtNum(total);

  const rankEl = document.getElementById(`calc-rank-${dayId}`);
  if (!rankEl) return;

  const lang = getLang();
  const reachedLabel  = lang === 'en' ? 'Reached' : lang === 'vi' ? 'Đạt được' : 'Достигнут';
  const needLabel     = lang === 'en' ? 'need' : lang === 'vi' ? 'cần' : 'нужно';

  /* Подсвечиваем строки в таблице личных наград */
  d.personal.forEach((req, ri) => {
    const row = document.getElementById(`prow-${dayId}-${ri}`);
    if (row) row.classList.toggle('highlight', total >= req);
  });

  /* Показываем текущий и следующий ранг */
  let currentRank = -1;
  d.personal.forEach((req, ri) => {
    if (total >= req) currentRank = ri;
  });

  let html = '';
  if (currentRank >= 0) {
    html += `<div class="calc-rank-line">
      <span class="calc-rank-name">${RANK_LABELS[currentRank]}</span>
      <span class="calc-rank-val calc-rank-ok">✓ ${reachedLabel}</span>
    </div>`;
  }
  if (currentRank < d.personal.length - 1) {
    const nextReq  = d.personal[currentRank + 1];
    const diff     = nextReq - total;
    html += `<div class="calc-rank-line">
      <span class="calc-rank-name">${RANK_LABELS[currentRank + 1]}</span>
      <span class="calc-rank-need">${needLabel} ${fmtNum(diff)}</span>
    </div>`;
  }
  if (!html) {
    html = `<div class="calc-rank-line">
      <span class="calc-rank-name" style="color:var(--gold)">🏆 MAX — ${RANK_LABELS[d.personal.length - 1]}</span>
    </div>`;
  }
  rankEl.innerHTML = html;
}

/* ═══════════════════════════════════════════
   LANG CHANGE HOOK
   ═══════════════════════════════════════════ */
function onLangChange() {
  renderAll();
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  if (typeof initShared === 'function') initShared();
  renderAll();
});
</script>
